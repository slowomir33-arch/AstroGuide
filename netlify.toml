# Netlify — build aplikacji Vite z katalogu `client/`
# Połącz repozytorium w UI Netlify; ten plik nadpisuje domyślne ustawienia.

[build]
  base = "client"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA (Vite + React): deep linki → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Hashe w nazwach plików z Vite — długi cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
